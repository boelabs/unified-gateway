                    type: string
                  additionalProperties: {}
                config: {}
      responses:
        "200":
          description: "{ data: <instance> }"
        "404": *a1
    delete:
      tags:
        - Admin
      summary: Delete an extension instance (master key)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted (idempotent)
  /admin/extensions/{id}/reset:
    post:
      tags:
        - Admin
      summary: Clear a circuit-breaker trip and re-activate an instance (master key)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "{ data: <extension status> }"
        "400": *a1
        "404": *a1
  /admin/logs:
    get:
      tags:
        - Admin
      summary: List request logs (master key, paginated, newest first)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: virtualKeyId
          in: query
          schema:
            type: string
            format: uuid
        - name: publicModel
          in: query
          schema:
            type: string
        - name: deploymentId
          in: query
          schema:
            type: string
            format: uuid
        - name: adapterKey
          in: query
          schema:
            type: string
        - name: callType
          in: query
          schema:
            type: string
          description: chat | responses | messages
        - name: status
          in: query
          schema:
            type: string
            enum:
              - success
              - error
        - name: requestId
          in: query
          schema:
            type: string
        - name: cacheHit
          in: query
          schema:
            type: boolean
        - name: start
          in: query
          schema:
            type: string
            format: date-time
          description: start_time >= (narrows partitions)
        - name: end
          in: query
          schema:
            type: string
            format: date-time
          description: start_time <=
      responses:
        "200":
          description: "{ data: [<requestLog>], pagination: {...} }"
        "400": *a1
  /admin/usage:
    get:
      tags:
        - Admin
      summary: Aggregate usage (requests, tokens, cost), optionally grouped (master key)
      description: Sums requests/tokens/cost over request_logs. Accepts the same filters as /admin/logs (virtualKeyId, publicModel, status, start, end, ...). groupBy=none returns a single total.
      parameters:
        - name: groupBy
          in: query
          required: false
          schema:
            type: string
            enum:
              - public_model
              - virtual_key
              - adapter_key
              - day
              - none
            default: none
        - name: virtualKeyId
          in: query
          schema:
            type: string
            format: uuid
        - name: publicModel
          in: query
          schema:
            type: string
        - name: adapterKey
          in: query
          schema:
            type: string
        - name: callType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum:
              - success
              - error
        - name: cacheHit
          in: query
          schema:
            type: boolean
        - name: start
          in: query
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: "{ data: [{ key, requests, promptTokens, completionTokens, totalTokens, costCents }] }"
        "400": *a1
  /admin/router-settings:
    get:
      tags:
        - Admin
      summary: View router config (master key)
      responses:
        "200":
          description: "{ data: <settings|null> }"
    put:
      tags:
        - Admin
      summary: Update router config (master key)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouterSettings"
            examples:
              default:
                value:
                  routingStrategy: simple-shuffle
                  unsupportedParameterStrategy: drop
                  allowedFails: 3
                  cooldownSeconds: 5
                  numRetries: 3
                  timeoutSeconds: 600
                  retryAfterSeconds: 0
      responses:
        "200":
          description: "{ data: <settings> }"
  /admin/fallbacks:
    get:
      tags:
        - Admin
      summary: List fallbacks (master key)
      responses:
        "200":
          description: "{ data: [...] }"
    put:
      tags:
        - Admin
      summary: Create/update dedicated fallback (master key)
      description: Configures an exact chain by (primaryModel, reason). Public Models must exist and each target must share at least one executable operation with the primary. The router exhausts the primary deployments before traversing the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Fallback"
            examples:
              general:
                value:
                  primaryModel: gpt
                  fallbackModels:
                    - gemini
                  reason: general
      responses:
        "201":
          description: "{ data: <fallback> }"
        "400": *a1
  /admin/fallbacks/{primaryModel}/{reason}:
    delete:
      tags:
        - Admin
      summary: Delete fallback (master key)
      parameters:
        - name: primaryModel
          in: path
          required: true
          schema:
            type: string
        - name: reason
          in: path
          required: true
          schema:
            type: string
            enum:
              - general
              - context_window
              - content_policy
      responses:
        "204":
          description: No Content
components:
  schemas:
    ChatCompletionRequest:
      type: object
      properties:
        model:
          type: string
          description: public model (public_model)
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum:
                  - system
                  - developer
                  - user
                  - assistant
                  - tool
              content: {}
            required:
              - role
            additionalProperties: true
        stream:
          default: false
          type: boolean
        stream_options:
          type: object
          properties:
            include_usage:
              type: boolean
            include_obfuscation:
              type: boolean
        temperature:
          type: number
        top_p:
          type: number
        max_tokens:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        max_completion_tokens:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        logprobs:
          type: boolean
        top_logprobs:
          type: integer
          minimum: 0
          maximum: 20
        logit_bias:
          type: object
          propertyNames:
            type: string
          additionalProperties:
            type: number
        metadata:
          type: object
          propertyNames:
            type: string
          additionalProperties:
            type: string
        modalities:
          type: array
          items:
            type: string
        prediction:
          type: object
          properties: {}
          additionalProperties: true
        service_tier:
          type: string
        store:
          type: boolean
        verbosity:
          type: string
        web_search_options:
          type: object
          properties: {}
          additionalProperties: true
        tools:
          type: array
          items:
            type: object
            properties: {}
            additionalProperties: true
        tool_choice: {}
        response_format:
          $ref: "#/components/schemas/ChatResponseFormat"
        plugins:
          maxItems: 1
          type: array
          items:
            $ref: "#/components/schemas/FileParserPlugin"
      required:
        - model
        - messages
      additionalProperties: true
    ChatResponseFormat:
      anyOf:
        - type: object
          properties:
            type:
              type: string
              const: text
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              const: json_object
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              const: json_schema
            json_schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                schema:
                  $ref: "#/components/schemas/JsonSchemaDefinition"
                strict:
                  anyOf:
                    - type: boolean
                    - type: "null"
              required:
                - name
          required:
            - type
            - json_schema
    JsonSchemaDefinition:
      type: object
      propertyNames:
        type: string
      additionalProperties: {}
      description: JSON Schema the model output must satisfy.
    FileParserPlugin:
      type: object
      properties:
        id:
          type: string
          const: file-parser
        enabled:
          type: boolean
        pdf:
          type: object
          properties:
            engine:
              type: string
              enum:
                - auto
                - native
                - pdf-text
          additionalProperties: true
      required:
        - id
      description: Request-scoped file portability. auto prefers native handling; pdf-text extracts UTF-8 text locally.
      additionalProperties: true
    ResponsesRequest:
      type: object
      properties:
        model:
          type: string
        input:
          description: string or array of items (message/function_call/...)
        instructions:
          anyOf:
            - type: string
            - type: "null"
        stream:
          default: false
          type: boolean
        max_output_tokens:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        max_tool_calls:
          type: integer
          minimum: 1
          maximum: 9007199254740991
        temperature:
          type: number
        top_p:
          type: number
        presence_penalty:
          type: number
        frequency_penalty:
          type: number
        top_logprobs:
          type: integer
          minimum: 0
          maximum: 20
        parallel_tool_calls:
          type: boolean
        include:
          type: array
          items:
            type: string
        metadata:
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
        service_tier:
          type: string
        stream_options:
          type: object
          properties: {}
          additionalProperties: true
        safety_identifier:
          type: string
          maxLength: 64
        prompt_cache_key:
          type: string
          maxLength: 64
        truncation:
          type: string
        context_management:
          type: array
          items:
            type: object
            properties: {}
            additionalProperties: true
        tools:
          type: array
          items:
            type: object
            properties: {}
            additionalProperties: true
        tool_choice: {}
        text:
          $ref: "#/components/schemas/ResponsesTextConfig"
        store:
          description: Persist server-side state for chaining with previous_response_id. Default follows RESPONSES_STORE_DEFAULT (true = OpenAI-compatible). Managed by the gateway; not forwarded upstream.
          type: boolean
        previous_response_id:
          description: "Chains with a stored response (store): the gateway concatenates its input+output with the new input. Local pointer, not forwarded upstream. Cannot be combined with conversation."
          type: string
        background:
          description: "Unsupported: background:true is rejected with 400."
          type: boolean
        conversation:
          description: "Unsupported: use previous_response_id for gateway-managed state."
        prompt:
          description: Prompt templates are unsupported (400).
        plugins:
          maxItems: 1
          type: array
          items:
            $ref: "#/components/schemas/FileParserPlugin"
      required:
        - model
      additionalProperties: true
    ResponsesTextConfig:
      type: object
      properties:
        format:
          $ref: "#/components/schemas/ResponsesTextFormat"
      additionalProperties: true
    ResponsesTextFormat:
      anyOf:
        - type: object
          properties:
            type:
              type: string
              const: text
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              const: json_object
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              const: json_schema
            name:
              type: string
            description:
              type: string
            schema:
              $ref: "#/components/schemas/JsonSchemaDefinition"
            strict:
              anyOf:
                - type: boolean
                - type: "null"
          required:
            - type
            - name
            - schema
    CompactResponseRequest:
      type: object
      properties:
        model:
          type: string
        input: {}
        previous_response_id:
          anyOf:
            - type: string
            - type: "null"
        instructions:
          anyOf:
            - type: string
            - type: "null"
        prompt_cache_key:
          type: string
          maxLength: 64
      required:
        - model
      additionalProperties: false
    MessagesRequest:
      type: object
      properties:
        model:
          type: string
        max_tokens:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum:
                  - user
                  - assistant
              content: {}
            required:
              - role
            additionalProperties: true
        system:
          description: string or array of text blocks
        stream:
          default: false
          type: boolean
        temperature:
          type: number
        top_p:
          type: number
        top_k:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        stop_sequences:
          type: array
          items:
            type: string
        tools:
          type: array
          items:
            type: object
            properties: {}
            additionalProperties: true
        tool_choice:
          type: object
          properties: {}
          additionalProperties: true
        output_config:
          $ref: "#/components/schemas/MessagesOutputConfig"
        metadata:
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
      required:
        - model
        - max_tokens
        - messages
      additionalProperties: true
    MessagesOutputConfig:
      type: object
      properties:
        effort:
          anyOf:
            - type: string
              enum:
                - low
                - medium
                - high
                - xhigh
                - max
            - type: "null"
        format:
          type: object
          properties:
            type:
              type: string
              const: json_schema
            schema:
              $ref: "#/components/schemas/JsonSchemaDefinition"
          required:
            - type
            - schema
      additionalProperties: true
    EmbeddingsRequest:
      type: object
      properties:
        model:
          type: string
          description: public model
        input:
          anyOf:
            - type: string
              minLength: 1
            - minItems: 1
              type: array
              items:
                type: string
                minLength: 1
            - minItems: 1
              type: array
              items:
                type: integer
                minimum: 0
                maximum: 9007199254740991
            - minItems: 1
              type: array
              items:
                minItems: 1
                type: array
                items:
                  type: integer
                  minimum: 0
                  maximum: 9007199254740991
        encoding_format:
          default: float
          type: string
          enum:
            - float
            - base64
        dimensions:
          type: integer
          minimum: 1
          maximum: 9007199254740991
        user:
          type: string
        extra_body:
          description: Provider-specific JSON parameters without collisions with managed fields.
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
      required:
        - model
        - input
    ImageGenerationRequest:
      type: object
      properties:
