        user:
          anyOf:
            - type: string
            - type: "null"
        extra_body:
          description: Provider-specific JSON parameters; max 64 KiB and no collisions with managed fields.
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
      required:
        - model
        - prompt
    ImageEditRequest:
      type: object
      properties:
        model:
          type: string
        prompt:
          type: string
          minLength: 1
          maxLength: 32000
        image:
