        background:
          anyOf:
            - type: string
              enum:
                - transparent
                - opaque
                - auto
            - type: "null"
        input_fidelity:
          anyOf:
            - type: string
              enum:
                - high
                - low
            - type: "null"
        n:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
        output_compression:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
        output_format:
          anyOf:
            - type: string
              enum:
                - png
                - jpeg
                - webp
            - type: "null"
        partial_images:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
        quality:
          anyOf:
            - type: string
              enum:
                - standard
                - low
                - medium
                - high
                - auto
            - type: "null"
        response_format:
          default: b64_json
          anyOf:
            - type: string
              enum:
                - b64_json
            - type: "null"
        size:
          anyOf:
            - type: string
              pattern: ^(auto|[1-9][0-9]*x[1-9][0-9]*)$
            - type: "null"
        stream:
          default: false
          anyOf:
            - type: boolean
            - type: "null"
        user:
          anyOf:
            - type: string
            - type: "null"
        extra_body:
          type: string
          description: Serialized JSON object; max 64 KiB.
      required:
        - model
        - prompt
        - image
    VideoCreateRequest:
      type: object
      properties:
        model:
          type: string
          description: public model
        prompt:
          type: string
          minLength: 1
          maxLength: 32000
        input_reference:
          description: Mutually exclusive with input_references.
          anyOf:
            - $ref: "#/components/schemas/VideoInputReference"
            - type: "null"
        input_references:
          anyOf:
            - type: array
              items:
                $ref: "#/components/schemas/VideoInputReferencePart"
            - type: "null"
        frame_images:
          anyOf:
            - type: array
              items:
                $ref: "#/components/schemas/VideoFrameImage"
            - type: "null"
        seconds:
          description: Mutually exclusive with duration.
          anyOf:
            - type: string
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
        duration:
          description: Duration in seconds.
          anyOf:
            - type: integer
              exclusiveMinimum: 0
              maximum: 9007199254740991
            - type: "null"
        size:
          description: Interchangeable with aspect_ratio + resolution.
          anyOf:
            - type: string
              pattern: ^[1-9][0-9]*x[1-9][0-9]*$
            - type: "null"
        aspect_ratio:
          anyOf:
            - type: string
              enum:
                - 16:9
                - 9:16
                - 1:1
                - 4:3
                - 3:4
                - 3:2
                - 2:3
                - 21:9
                - 9:21
            - type: "null"
        resolution:
          anyOf:
            - type: string
              enum:
                - 480p
                - 720p
                - 1080p
                - 1K
                - 2K
                - 4K
            - type: "null"
        seed:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
        generate_audio:
          anyOf:
            - type: boolean
            - type: "null"
        quality:
          anyOf:
            - type: string
              enum:
                - standard
                - hd
                - low
                - medium
                - high
                - auto
            - type: "null"
        user:
          description: Gateway-side attribution; never sent upstream.
          anyOf:
            - type: string
            - type: "null"
        extra_body:
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
      required:
        - model
        - prompt
      additionalProperties: true
    VideoInputReference:
      type: object
      properties:
        image_url:
          anyOf:
            - type: string
            - type: object
              properties:
                url:
                  type: string
              required:
                - url
        file_id:
          type: string
      description: "OpenAI-compatible single reference: exactly one of image_url or file_id."
    VideoInputReferencePart:
      anyOf:
        - type: object
          properties:
            type:
              type: string
              const: image_url
            image_url:
              type: object
              properties:
                url:
                  type: string
              required:
                - url
          required:
            - type
            - image_url
        - type: object
          properties:
            type:
              type: string
              const: audio_url
            audio_url:
              type: object
              properties:
                url:
                  type: string
              required:
                - url
          required:
            - type
            - audio_url
        - type: object
          properties:
            type:
              type: string
              const: video_url
            video_url:
              type: object
              properties:
                url:
                  type: string
              required:
                - url
          required:
            - type
            - video_url
      description: A reference asset guiding generation. Audio/video references are only honored by providers that support them.
    VideoFrameImage:
      type: object
      properties:
        type:
          type: string
          const: image_url
        image_url:
          type: object
          properties:
            url:
              type: string
          required:
            - url
        frame_type:
          type: string
          enum:
            - first_frame
            - last_frame
      required:
        - type
        - image_url
        - frame_type
    ResolveDeployment:
      type: object
      properties:
        publicModel:
          type: string
          description: Public alias sent as model in /v1.
        adapterKey:
          type: string
          description: Code adapter key (for example openai, googleaistudio, anthropic, openaicompatible).
        upstreamModel:
          type: string
          description: Exact ID; preserves slash namespaces.
        catalogEntry:
          description: REQUIRED if the model is not in the catalog (custom); FORBIDDEN if it is. 1:1 entry with catalog.json.
          $ref: "#/components/schemas/CatalogEntry"
        pricing:
          description: Operator pricing for cost calculation (optional).
          type: object
          propertyNames:
            type: string
          additionalProperties:
            type: number
        transportOverrides:
          description: Per-operation transport override. Usually inferred from the adapter; rarely needed.
          $ref: "#/components/schemas/TransportOverrides"
        credentials:
          description: Accepted for body reuse with POST /admin/deployments, but ignored by resolve.
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
        label:
          description: Accepted for body reuse with POST /admin/deployments, but ignored by resolve.
          anyOf:
            - type: string
            - type: "null"
        metadata:
          description: Accepted for body reuse with POST /admin/deployments, but ignored by resolve.
          type: object
