        moderation:
          anyOf:
            - type: string
              enum:
                - low
                - auto
            - type: "null"
        n:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
        output_compression:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
        output_format:
          anyOf:
            - type: string
              enum:
                - png
                - jpeg
                - webp
            - type: "null"
        partial_images:
          anyOf:
            - type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
            - type: "null"
        quality:
          anyOf:
            - type: string
              enum:
                - standard
                - hd
                - low
                - medium
                - high
                - auto
            - type: "null"
        response_format:
          default: b64_json
          anyOf:
            - type: string
              enum:
                - b64_json
            - type: "null"
        size:
          anyOf:
            - type: string
              pattern: ^(auto|[1-9][0-9]*x[1-9][0-9]*)$
            - type: "null"
        stream:
          default: false
          anyOf:
            - type: boolean
            - type: "null"
        style:
          anyOf:
            - type: string
              enum:
                - vivid
                - natural
